<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyPulse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Weather Particles -->
<div id="particleCanvas" class="particle-canvas"></div>

<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
  <i class="fa-solid fa-moon" id="themeIcon"></i>
</button>

<div class="app-container">

  <!-- Header -->
  <header class="app-header">
    <h1 class="app-title"><i class="fa-solid fa-cloud-sun"></i> SkyPulse</h1>
    <p class="app-subtitle">Real-time weather, worldwide</p>
  </header>

  <!-- Search Section -->
  <div class="search-section glass-card" style="padding: 16px 20px;">
    <div class="search-wrapper">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" class="search-input" id="searchInput" placeholder="Search for a city..." autocomplete="off">
      <button class="location-btn" id="locationBtn" title="Use my location">
        <i class="fa-solid fa-location-crosshairs"></i>
      </button>
      <!-- Search Results Dropdown -->
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
  </div>

  <!-- Favorites Bar -->
  <div class="favorites-bar" id="favoritesBar"></div>

  <!-- Loading Skeleton -->
  <div id="loadingSkeleton" class="hidden">
    <div class="skeleton skeleton-hero"></div>
    <div class="skeleton skeleton-details"></div>
  </div>

  <!-- Weather Hero Section -->
  <div id="weatherSection" class="hidden">
    <div class="weather-hero fade-in-up">
      <div class="hero-icon" id="heroIcon"></div>
      <div class="hero-temp" id="heroTemp"></div>
      <div class="hero-desc" id="heroDesc"></div>
      <div class="hero-city" id="heroCity"></div>
      <!-- Live Clock -->
      <div class="hero-time" id="heroTime"></div>
      <!-- Sunrise / Sunset Bar -->
      <div class="sun-bar" id="sunBar" style="display:none;">
        <div class="sun-track">
          <div class="sun-dot" id="sunDot"></div>
        </div>
        <div class="sun-labels">
          <span id="sunriseLabel"></span>
          <span id="sunsetLabel"></span>
        </div>
      </div>
      <div class="hero-actions">
        <button class="fav-btn" id="favBtn" title="Add to favorites">
          <i class="fa-regular fa-heart"></i>
        </button>
      </div>
    </div>

    <!-- Comfort Score -->
    <div class="comfort-section fade-in-up" id="comfortSection">
      <svg class="comfort-svg" viewBox="0 0 120 120" width="120" height="120">
        <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10" />
        <circle cx="60" cy="60" r="48" fill="none" stroke="#48bb78" stroke-width="10"
                stroke-linecap="round" stroke-dasharray="301.6" stroke-dashoffset="301.6"
                transform="rotate(-90 60 60)" id="comfortArc" />
        <text x="60" y="55" text-anchor="middle" fill="var(--text-primary)" font-size="22" font-weight="800" id="comfortScoreText">--</text>
        <text x="60" y="72" text-anchor="middle" fill="var(--text-muted)" font-size="9" id="comfortLabel">COMFORT</text>
      </svg>
      <div class="comfort-right">
        <div class="comfort-status" id="comfortStatus">--</div>
        <div class="clothing-chips" id="clothingChips"></div>
      </div>
    </div>

    <!-- Weather Details Grid -->
    <div class="weather-details fade-in-up" id="weatherDetails"></div>

    <!-- Forecast Section -->
    <div class="section-header">
      <span class="section-title"><i class="fa-solid fa-calendar-days"></i> Forecast</span>
      <div class="view-toggle">
        <button class="view-toggle-btn active" id="cardViewBtn" onclick="setForecastView('cards')">Cards</button>
        <button class="view-toggle-btn" id="chartViewBtn" onclick="setForecastView('chart')">Chart</button>
        <button class="view-toggle-btn" id="dailyViewBtn" onclick="setForecastView('daily')">5 Day</button>
      </div>
    </div>

    <div id="forecastCards" class="forecast-scroll"></div>
    <div id="forecastChart" class="chart-container glass-card hidden">
      <div class="chart-tabs">
        <button class="chart-tab active" data-type="temperature" onclick="switchChart('temperature')">Temp</button>
        <button class="chart-tab" data-type="wind" onclick="switchChart('wind')">Wind</button>
        <button class="chart-tab" data-type="humidity" onclick="switchChart('humidity')">Humidity</button>
      </div>
      <canvas id="tempChart"></canvas>
    </div>
    <div id="forecastDaily" class="daily-forecast hidden"></div>

    <!-- Map Section -->
    <div class="section-header" style="margin-top: 24px;">
      <span class="section-title"><i class="fa-solid fa-map-location-dot"></i> Map</span>
    </div>
    <div class="map-section glass-card" style="padding: 0; overflow: hidden;">
      <div id="weatherMap"></div>
    </div>
  </div>

  <footer class="app-footer">
    SkyPulse &mdash; Built with FastAPI, Hugging Face AI, OpenWeatherMap, Leaflet & Chart.js
  </footer>
</div>

<!-- Chat Interface -->
<button class="chat-toggle-btn" onclick="toggleChat()" id="chatToggle">
  <i class="fa-solid fa-comment-dots"></i>
</button>

<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <span><i class="fa-solid fa-robot"></i> SkyPulse AI</span>
    <button class="chat-close-btn" onclick="toggleChat()">&times;</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="message ai">Hi! I'm SkyPulse AI. Ask me anything about weather, clothing, or safety tips!</div>
  </div>
  <div class="typing-indicator" id="typingIndicator">
    <div class="typing-dots"><div></div><div></div><div></div></div>
  </div>
  <div class="chat-input-area">
    <input type="text" class="chat-input" id="chatInput" placeholder="Ask about weather..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button class="chat-send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
  </div>
</div>

<!-- External Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/js/charts.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
