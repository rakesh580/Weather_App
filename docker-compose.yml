version: '3.8'

services:
  weather-app:
    build: .
    ports:
      - "9000:9000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT}
      - OPENWEATHER_API_KEY=f2b2aea1751f9100a4550af87233e111
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/chat/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
